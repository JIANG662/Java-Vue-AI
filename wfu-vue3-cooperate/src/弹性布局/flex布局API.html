<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>flex布局</title>
</head>
<body>


    <h3>1.flex-direction排列方向属性</h3>

    <div class="box">
        <div>1</div>
        <div>2</div>
        <div>3</div>
    </div>
    <h3>2.flex-wrap换行属性</h3>

    <div class="box2">
        <div>1</div>
        <div>2</div>
        <div>3</div>
        <div>4</div>

    </div>

    <h3>3.justify-content主轴对齐方式属性</h3>

    <div class="box3">
        <div>1</div>
        <div>2</div>
        <div>3</div>
<!--        <div>4</div>-->

    </div>
    <h3>4.align-items交叉对齐方式属性</h3>

    <div class="box4">
        <div>1</div>
        <div>2</div>
        <div>3</div>
        <!--        <div>4</div>-->

    </div>
    <h2>项目属性</h2>
    <h3>5.order排序属性</h3>

    <div class="box5">
        <div style="align-self : center">1</div>
        <div style="order : -1">2</div>
        <div>3</div>
        <!--        <div>4</div>-->

    </div>
    <h3>6.flex:1 自动填充属性</h3>

    <div class="box6">
        <div>1</div>
        <div style="flex:1">2</div>
        <div>3</div>
        <!--        <div>4</div>-->

    </div>
</body>
<style>
<!--    将页面父元素高度设置为100 -->
    html,body{
        height: 100%;
    }
    .box{
        display: flex;
        flex-direction: column-reverse;
    }
    /*子代选择器*/
    .box div{
        width: 100px;
        height: 50px;
        background-color: pink;
        /*外边距*/
        margin: 10px;
    }


    .box2{
        display: flex;

        background-color: yellow;
        height: 200px;
        flex-wrap: wrap;
    }
    /*子代选择器*/
    .box2 div{

        width: 30%;
        height: 50px;
        background-color: pink;

        /*外边距*/
        margin: 10px;
    }

    .box3{
        display: flex;
        justify-content: space-between;
        background-color: green;
        height: 100px;
        padding: 0 20px;<!--通过内边距调整左右边距，一般不用space-around-->
    }
    /*子代选择器*/
    .box3 div{

        width: 100px;
        height: 50px;
        background-color: pink;

        /*外边距*/
        margin: 10px 0;<!--上下10个像素 左右不留空-->

    }
    .box4{
        display: flex;
        height: 300px;
        background-color: blue;

        align-items: stretch;

    }
    /*子代选择器*/
    .box4 div{

        width: 100px;
        height: auto;
        background-color: pink;

        /*外边距*/
        margin: 10px;
    }
     .box5{
        display: flex;
        height: 200px;
        background-color: yellow;



    }
    /*子代选择器*/
    .box5 div{

        width: 100px;
        height: 50px;
        background-color: pink;

        /*外边距*/
        margin: 10px;
    }
     .box6 {
        display: flex;
        height: 200px;
        background-color: yellow;



    }
    /*子代选择器*/
    .box6 div{

        width: 100px;
        height: auto;
        background-color: pink;

        /*外边距*/
        margin: 10px;
    }
</style>
</html>
