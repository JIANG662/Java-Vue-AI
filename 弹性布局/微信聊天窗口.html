<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>微信聊天窗口</title>
</head>
<body>
    <!-- 最外层容器 -->
    <div class="container">
        <!--   聊天窗口的卡片     -->
        <div class="chat-out">
            <!--头部-->
            <div class="header">
                <div>易途&潍院22级计科1班实训(39)</div>
                <div>
                    <img src="./img/1.png" >
                </div>
            </div>
            <!--主体-->
            <div class="main">

            </div>
            <!--底部-->
            <div class="bottom">
                <div class="bottom-header">
                    <div><img style="width: 210px" src="./img/2.png" ></div>
                    <div><img style="width: 80px" src="./img/3.png" ></div>
                </div>
                <div>
                    <input type="text">
                </div>
                <div class="bottom-send">
                    <div class="bt-out">
                        <div>发送(S)</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
<style>
    html,body{
        height: 100%;
    }
    .container{
        height: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
    }
    .chat-out{
        width: 540px;
        /* 基于浏览器窗口的百分比 */
        height: 90vh;
        /* 边框 border: 边框大小 线体类型 边框颜色 */
        border:1px solid #b0b0b0;
        /* 边框圆角 */
        border-radius: 10px;
        /* 阴影 */
        box-shadow: 0px 0px 18px #b0b0b0;
        background-color: #EDEDED;
        display: flex;
        flex-direction: column;
    }
    .header{
        height: 76px;
        /* 下边框 */
        border-bottom:1px solid #D5D5D5 ;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 10px 0 15px;
    }
    .bottom{
        height: 150px;
        border-top: 1px solid #D5D5D5 ;
    }
    .main{
        flex: 1;
    }
    .bottom-header{
        display: flex;
        align-items: center;
        justify-content: space-between;
    }
    input{
        width: 95%;
        height: 45px;
        border: none;
        outline: none;
        background-color: #EDEDED;
        margin-left: 10px;
    }
    .bt-out{
        width: 96px;
        height: 32px;
        background-color: #06B75B;
        border-radius: 5px;
        display: flex;
        justify-content: center;
        align-items: center;
        color: white;
        margin-right: 30px;
    }
    .bottom-send{
        display: flex;
        justify-content: flex-end;
    }
</style>
</html>
